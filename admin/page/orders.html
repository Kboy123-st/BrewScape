<div class="header-dashboard">
    <h2>Order Management</h2>
    <div class="filters-container">
        <select id="statusFilter" class="form-select" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="All">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Preparing">Preparing</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
        </select>
    </div>
</div>

<div class="table-card">
    <div class="header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <div id="order-count" class="muted-text">0 orders total</div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="orderSearch" placeholder="Search Order ID...">
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Order Details</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="order-table-body"></tbody>
    </table>
</div>
