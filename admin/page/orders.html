<div class="header-dashboard">
    <h2>Order Management</h2>
    <div style="display: flex; align-items: center; gap: 15px;">
        <!-- <button class="btn-create" onclick="openAddOrderModal()"><i class="fas fa-plus"></i> Create Order</button> -->
        <div class="filters-container">
            <select id="statusFilter" class="form-select" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                <option value="All">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Preparing">Preparing</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>
    </div>
</div>

<div class="table-card">
    <div class="header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <div id="order-count" class="muted-text">0 orders total</div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="orderSearch" placeholder="Search Order ID...">
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Order Details</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="order-table-body"></tbody>
    </table>
</div>

<!-- Order Details Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="orderDetailsModalBox">
        <div class="modal-header">
            <h3 id="modalTitle">Order Details</h3>
            <span class="close-btn" onclick="closeOrderDetailsModal()">&times;</span>
        </div>
        <div id="orderDetailsContent"></div>
    </div>
</div>

<!-- Add Order Modal -->
<div class="modal-overlay" id="addOrderModalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Create New Order</h3>
            <span class="close-btn" onclick="closeAddOrderModal()">&times;</span>
        </div>
        <form id="addOrderForm">
            <div class="form-group">
                <label>Customer</label>
                <select id="order-user" required></select>
            </div>
            <div class="form-group">
                <label>Product</label>
                <select id="order-product" required></select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="order-qty" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="order-payment">
                        <option value="Cash">Cash</option>
                        <option value="Card">Card</option>
                        <option value="Online">Online</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea id="order-address" rows="2" required></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeAddOrderModal()">Cancel</button>
                <button type="submit" class="btn-create">Place Order</button>
            </div>
        </form>
    </div>
</div>
