<div class="header-dashboard">
    <h2>Dashboard</h2>
    <div class="muted-text">Overview of your coffee shop</div>
</div>

<div class="overview-box">
    <div class="box">
        <div class="box-title muted-text">Total Revenue</div>
        <div class="box-value" id="stat-revenue">$0.00</div>
        <div class="box-icon" style="color: #10b981;"><i class="fas fa-dollar-sign"></i></div>
    </div>
    <div class="box">
        <div class="box-title muted-text">Total Orders</div>
        <div class="box-value" id="stat-orders">0</div>
        <div class="box-icon" style="color: #6366f1;"><i class="fas fa-shopping-bag"></i></div>
    </div>
    <div class="box">
        <div class="box-title muted-text">Total Customers</div>
        <div class="box-value" id="stat-users">0</div>
        <div class="box-icon" style="color: #f59e0b;"><i class="fas fa-users"></i></div>
    </div>
    <div class="box">
        <div class="box-title muted-text">Total Products</div>
        <div class="box-value" id="stat-products">0</div>
        <div class="box-icon" style="color: #ec4899;"><i class="fas fa-coffee"></i></div>
    </div>
</div>

<div class="dashboard-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 25px;">
    <div class="table-card">
        <h3 style="padding: 20px;">Revenue Growth</h3>
        <div style="padding: 0 20px 20px;">
            <canvas id="revenueChart" height="200"></canvas>
        </div>
    </div>
    <div class="table-card">
        <h3 style="padding: 20px;">Order Status</h3>
        <div style="padding: 0 20px 20px;">
            <canvas id="statusChart" height="200"></canvas>
        </div>
    </div>
</div>

<div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 25px;">
    <div class="table-card">
        <div class="header" style="padding: 20px; border-bottom: 1px solid #eee;">
            <h3 style="margin:0;">Recent Orders</h3>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="recent-orders-body"></tbody>
        </table>
    </div>
</div>
