<div class="header-dashboard">
    <h2>Product Management</h2>
    <button class="btn-create" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Product</button>
</div>

<div class="table-card">
    <div class="header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <div id="product-count" class="muted-text">0 products total</div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search products...">
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="product-table-body"></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Add Product</h3>
            <span class="close-btn" onclick="toggleModal()">&times;</span>
            <!-- <span class="close-btn" onclick="closeProductModal()">&times;</span> -->
        </div>
        <form id="productForm">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required></select>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="price" step="0.01" required>
                </div>
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="stock" required>
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <div class="drop-zone" id="drop-zone">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #ccc;"></i>
                    <p style="margin-top: 10px; color: #888; font-size: 14px;">Drag & drop image or click to upload</p>
                    <img id="image-preview" src="">
                </div>
                <input type="file" id="image-file" accept="image/*" style="display:none;">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="2"></textarea>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="featured-toggle" style="width:auto;">
                <label for="featured-toggle" style="margin-bottom:0;">Featured Product</label>
            </div>
            <div class="modal-footer" style="margin-top:20px; text-align:right;">
                <button type="button" class="btn-cancel" onclick="toggleModal()" style="margin-right:10px;">Cancel</button>
                <button type="button" class="btn-cancel" onclick="closeProductModal()" style="margin-right:10px;">Cancel</button>
                <button type="submit" class="btn-create" id="submitBtn">Save Product</button>
            </div>
        </form>
    </div>
</div>
