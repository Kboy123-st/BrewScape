<div class="header-dashboard">
    <h2>User Management</h2>
    <button class="btn-create" onclick="toggleModal()"><i class="fas fa-plus"></i> Add User</button>
</div>

<div class="table-card">
    <div class="header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <div id="user-count" class="muted-text">0 users total</div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="userSearch" placeholder="Search name or email...">
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>User</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Add User</h3>
            <span class="close-btn" onclick="toggleModal()">&times;</span>
        </div>
        <form id="userForm">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user-name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="user-email" required>
            </div>
            <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="user-phone">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="user-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer" style="margin-top:20px; text-align:right;">
                <button type="button" class="btn-cancel" onclick="toggleModal()" style="margin-right:10px;">Cancel</button>
                <button type="submit" class="btn-create">Save User</button>
            </div>
        </form>
    </div>
</div>
