<div class="header-dashboard">
    <h2>Payment History</h2>
    <div class="muted-text" id="payment-count">0 payments total</div>
</div>

<div class="table-card">
    <div class="header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="paymentSearch" placeholder="Search Payment ID or Order ID...">
        </div>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Payment ID</th>
                <th>Order ID</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="payment-table-body"></tbody>
    </table>
</div>
