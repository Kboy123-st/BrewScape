<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Brewscape</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar-custom">
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-mug-saucer text-warning"></i> <span>Brewscape</span></a></div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about_us.html">About Us</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="favorites.html"><i class="fa-regular fa-heart"></i></a>
                <a href="checkout.html" class="active"><i class="fa-solid fa-cart-shopping"></i> <span class="badge bg-warning text-dark" id="cart-count">0</span></a>
                <div class="user-dropdown">
                    <a href="javascript:void(0)" id="user-menu-btn"><i class="fa-regular fa-user"></i> <i class="fa-solid fa-angle-down ms-1"></i></a>
                    <div class="dropdown-content" id="user-dropdown-menu">
                        <div class="user-info p-3 border-bottom">
                            <div class="fw-bold" id="user-name-display">Guest</div>
                            <div class="small text-muted" id="user-email-display">Sign in to order</div>
                        </div>
                        <a href="my_profile.html"><i class="fa-regular fa-user me-2"></i> My Profile</a>
                        <a href="my_orders.html"><i class="fa-solid fa-box me-2"></i> My Orders</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart me-2"></i> Favorites</a>
                        <div id="admin-link-container"></div>
                        <a href="javascript:void(0)" id="logout-btn" class="text-danger"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4">Your Shopping Cart</h2>
        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 mb-4" id="cart-container">
                    <!-- Items loaded dynamically -->
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h4>Order Summary</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Delivery Fee</span>
                        <span>$0.00</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold text-primary" id="total-price">$0.00</span>
                    </div>
                    <button class="btn btn-primary-gold w-100 py-3" onclick="placeOrder()">Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/core-data.js"></script>
    <script src="../js/index.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            renderCart();
        });

        function renderCart() {
            const currentUser = BrewscapeData.getCurrentUser();
            if (!currentUser) { window.location.href = "login.html"; return; }

            const products = BrewscapeData.getData("products");
            const carts = BrewscapeData.getData("carts");
            const userCart = carts.find(c => c.userId === currentUser.id);
            const container = document.getElementById("cart-container");

            if (!userCart || userCart.items.length === 0) {
                container.innerHTML = 
                    `<div class="text-center py-5">
                        <i class="fa-solid fa-cart-shopping mb-3" style="font-size: 64px; color: #ccc;"></i>
                        <h3>Your cart is empty</h3>
                        <a href="menu.html" class="btn btn-primary-gold mt-3">Continue Shopping</a>
                    </div>`;
                return;
            }

            let subtotal = 0;
            container.innerHTML = userCart.items.map(item => {
                const p = products.find(prod => prod.id === item.productId);
                if (!p) return "";
                const itemTotal = p.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <div class="d-flex align-items-center justify-content-between mb-4 pb-4 border-bottom">
                        <div class="d-flex align-items-center">
                            <img src="${p.image}" width="80" height="80" class="rounded object-fit-cover me-3">
                            <div>
                                <h5 class="mb-1">${p.name}</h5>
                                <p class="text-muted small mb-0">$${p.price.toFixed(2)} each</p>
                            </div>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-secondary px-2" onclick="updateQty(${p.id}, -1)">-</button>
                            <span class="mx-3 fw-bold">${item.quantity}</span>
                            <button class="btn btn-sm btn-outline-secondary px-2" onclick="updateQty(${p.id}, 1)">+</button>
                            <span class="ms-4 fw-bold">$${itemTotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join("");

            document.getElementById("subtotal").textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById("total-price").textContent = `$${subtotal.toFixed(2)}`;
        }

        function updateQty(productId, change) {
            const currentUser = BrewscapeData.getCurrentUser();
            let carts = BrewscapeData.getData("carts");
            let userCart = carts.find(c => c.userId === currentUser.id);
            const itemIndex = userCart.items.findIndex(i => i.productId === productId);
            
            userCart.items[itemIndex].quantity += change;
            if (userCart.items[itemIndex].quantity <= 0) {
                userCart.items.splice(itemIndex, 1);
            }
            
            BrewscapeData.saveData("carts", carts);
            renderCart();
        }

        function placeOrder() {
            const currentUser = BrewscapeData.getCurrentUser();
            const carts = BrewscapeData.getData("carts");
            const userCart = carts.find(c => c.userId === currentUser.id);
            if (!userCart || userCart.items.length === 0) return;

            const products = BrewscapeData.getData("products");
            let total = 0;
            let itemsCount = 0;
            userCart.items.forEach(item => {
                const p = products.find(prod => prod.id === item.productId);
                total += p.price * item.quantity;
                itemsCount += item.quantity;
            });

            const orderId = "ORD-" + Math.random().toString(36).substr(2, 4);
            const newOrder = {
                id: orderId,
                userId: currentUser.id,
                date: new Date().toLocaleString(),
                total: total,
                status: "Pending",
                itemsCount: itemsCount,
                address: "123 Coffee Lane, Brew City"
            };

            const orders = BrewscapeData.getData("orders");
            orders.push(newOrder);
            BrewscapeData.saveData("orders", orders);

            const payments = BrewscapeData.getData("payments");
            payments.push({
                id: "PAY-" + Math.random().toString(36).substr(2, 4),
                orderId: orderId,
                method: "Cash",
                status: "Pending",
                date: new Date().toLocaleString(),
                amount: total
            });
            BrewscapeData.saveData("payments", payments);

            // Clear Cart
            userCart.items = [];
            BrewscapeData.saveData("carts", carts);

            alert("Order placed successfully! Order ID: " + orderId);
            window.location.href = "my_orders.html";
        }
    </script>
</body>
</html>
