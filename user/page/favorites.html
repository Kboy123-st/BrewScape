<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites - Brewscape</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar-custom">
        <div class="container">
            <div class="logo"><a href="../../index.html"><i class="fa-solid fa-mug-saucer text-warning"></i> <span>Brewscape</span></a></div>
            <div class="nav-links">
                <a href="../../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about_us.html">About Us</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="favorites.html" class="active"><i class="fa-solid fa-heart text-danger"></i></a>
                <a href="checkout.html" class="cart-icon"><i class="fa-solid fa-cart-shopping"></i> <span class="badge bg-warning text-dark" id="cart-count">0</span></a>
                <div class="user-dropdown">
                    <a href="javascript:void(0)" id="user-menu-btn"><i class="fa-regular fa-user"></i> <i class="fa-solid fa-angle-down ms-1"></i></a>
                    <div class="dropdown-content" id="user-dropdown-menu">
                        <div class="user-info p-3 border-bottom">
                            <div class="fw-bold" id="user-name-display">Guest</div>
                            <div class="small text-muted" id="user-email-display">Sign in to order</div>
                        </div>
                        <a href="my_profile.html"><i class="fa-regular fa-user me-2"></i> My Profile</a>
                        <a href="my_orders.html"><i class="fa-solid fa-box me-2"></i> My Orders</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart me-2"></i> Favorites</a>
                        <div id="admin-link-container"></div>
                        <a href="javascript:void(0)" id="logout-btn" class="text-danger"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <header class="page-header py-5 bg-light">
        <div class="container text-center">
            <h1 class="display-4">My Favorites</h1>
            <p class="text-muted">Your most loved coffee and treats in one place</p>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row g-4" id="favorites-container">
                <!-- Favorites loaded dynamically -->
            </div>
        </div>
    </section>

    <script src="../../assets/js/core-data.js"></script>
    <script src="../js/index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = BrewscapeData.getCurrentUser();
            if (!currentUser) { window.location.href = 'login.html'; return; }

            const products = BrewscapeData.getData('products');
            renderFavorites();
        });

        function renderFavorites() {
            const currentUser = BrewscapeData.getCurrentUser();
            const products = BrewscapeData.getData('products');
            const favorites = BrewscapeData.getData('favorites').filter(f => f.userId === currentUser.id);
            const container = document.getElementById('favorites-container');
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fa-regular fa-heart mb-3" style="font-size: 64px; color: #ccc;"></i>
                        <h3>No favorites yet</h3>
                        <p class="text-muted">Explore our menu and heart your favorite items!</p>
                        <a href="menu.html" class="btn btn-primary-gold mt-3">Explore Menu</a>
                    </div>
                `;
            } else {
                container.innerHTML = favorites.map(fav => {
                    const p = products.find(prod => prod.id === fav.productId);
                    if (!p) return '';
                    return `
                        <div class="col-lg-3 col-md-4 col-sm-6">
                            <div class="product-card">
                                <div class="product-img-wrapper">
                                    <img src="${p.image}" alt="${p.name}">
                                </div>
                                <div class="product-content">
                                    <h3 class="product-title">${p.name}</h3>
                                    <div class="product-footer">
                                        <div class="product-price">$${p.price.toFixed(2)}</div>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-outline-danger btn-sm" onclick="removeFavorite(${p.id})"><i class="fa-solid fa-trash"></i></button>
                                            <button class="btn btn-primary-gold btn-sm" onclick="addToCart(${p.id})">Add</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        };

        function removeFavorite(productId) {
            const currentUser = BrewscapeData.getCurrentUser();
            let favorites = BrewscapeData.getData('favorites');
            favorites = favorites.filter(f => !(f.userId === currentUser.id && f.productId === productId));
            BrewscapeData.saveData('favorites', favorites);
            location.reload();
        }
    </script>
</body>
</html>
