<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Brewscape</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .profile-container { padding: 60px 0; background-color: #fdfaf7; min-height: 80vh; }
        .profile-sidebar { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profile-avatar { width: 100px; height: 100px; background: #eee; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #999; }
        .profile-nav { list-style: none; padding: 0; margin-top: 30px; }
        .profile-nav li a { display: block; padding: 12px 15px; color: var(--text-dark); text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: all 0.3s; }
        .profile-nav li a:hover, .profile-nav li a.active { background: var(--light-cream); color: var(--gold); }
        .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h2 { font-size: 36px; color: var(--primary-brown); margin-bottom: 5px; }
        .stat-card p { color: var(--text-muted); margin: 0; font-size: 14px; }
        .recent-orders-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 30px; }
        .order-item-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .order-item-row:last-child { border-bottom: none; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff8e1; color: #f5a623; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-mug-saucer text-warning"></i> <span>Brewscape</span></a></div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about_us.html">About Us</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="favorites.html"><i class="fa-regular fa-heart"></i></a>
                <a href="checkout.html" class="cart-icon"><i class="fa-solid fa-cart-shopping"></i> <span class="badge bg-warning text-dark" id="cart-count">0</span></a>
                <div class="user-dropdown">
                    <a href="javascript:void(0)" id="user-menu-btn" class="active"><i class="fa-regular fa-user"></i> <i class="fa-solid fa-angle-down ms-1"></i></a>
                    <div class="dropdown-content" id="user-dropdown-menu">
                        <div class="user-info p-3 border-bottom">
                            <div class="fw-bold" id="user-name-display">Guest</div>
                            <div class="small text-muted" id="user-email-display">Sign in to order</div>
                        </div>
                        <a href="my_profile.html"><i class="fa-regular fa-user me-2"></i> My Profile</a>
                        <a href="my_orders.html"><i class="fa-solid fa-box me-2"></i> My Orders</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart me-2"></i> Favorites</a>
                        <div id="admin-link-container"></div>
                        <a href="javascript:void(0)" id="logout-btn" class="text-danger"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="container">
            <div class="row">
                <div class="col-lg-4">
                    <div class="profile-sidebar text-center">
                        <div class="profile-avatar"><i class="fa-regular fa-user"></i></div>
                        <h3 id="profile-name">User Name</h3>
                        <p class="text-muted mb-2" id="profile-email">email@example.com</p>
                        <span class="badge bg-warning text-dark px-3 py-2" id="profile-role">User</span>
                        
                        <ul class="profile-nav text-start">
                            <li><a href="my_orders.html"><i class="fa-solid fa-box me-2"></i> My Orders</a></li>
                            <li><a href="favorites.html"><i class="fa-regular fa-heart me-2"></i> Favorites</a></li>
                            <li id="admin-dashboard-link" style="display:none;"><a href="../../admin/index.html"><i class="fa-solid fa-user-shield me-2"></i> Admin Dashboard</a></li>
                            <li><a href="javascript:void(0)" id="logout-btn" class="text-danger"><i class="fa-solid fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="stat-card">
                                <h2 id="total-orders-count">0</h2>
                                <p>Total Orders</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="stat-card">
                                <h2 id="favorites-count">0</h2>
                                <p>Favorites</p>
                            </div>
                        </div>
                    </div>

                    <div class="recent-orders-card">
                        <h4 class="mb-4">Recent Orders</h4>
                        <div id="recent-orders-list">
                            <!-- Orders loaded dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/core-data.js"></script>
    <script src="../js/index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = BrewscapeData.getCurrentUser();
            if (!currentUser) { window.location.href = 'login.html'; return; }

            const orders = BrewscapeData.getData('orders').filter(o => o.userId === currentUser.id);
            const favorites = BrewscapeData.getData('favorites').filter(f => f.userId === currentUser.id);

            // Update UI
            document.getElementById('profile-name').textContent = currentUser.name;
            document.getElementById('profile-email').textContent = currentUser.email;
            document.getElementById('profile-role').textContent = currentUser.role.toUpperCase();
            document.getElementById('total-orders-count').textContent = orders.length;
            document.getElementById('favorites-count').textContent = favorites.length;

            if (currentUser.role === 'admin') {
                document.getElementById('admin-dashboard-link').style.display = 'block';
            }

            const ordersList = document.getElementById('recent-orders-list');
            if (orders.length === 0) {
                ordersList.innerHTML = '<p class="text-muted">No orders yet.</p>';
            } else {
                ordersList.innerHTML = orders.slice(-5).reverse().map(order => `
                    <div class="order-item-row d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold">${order.itemsCount} items</div>
                            <div class="small text-muted">${order.id}</div>
                        </div>
                        <div class="text-center">
                            <div class="fw-bold">$${Number(order.total).toFixed(2)}</div>
                            <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
