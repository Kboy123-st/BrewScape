<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brewscape</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--light-cream);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-brown);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-mug-saucer text-warning"></i>
                <span>Brewscape</span>
            </div>
            <h4 class="text-center mb-4">Welcome Back</h4>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="enter your email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="enter your password" required>
                    <div class="form-text mt-2">
                        Use <strong>user123</strong> for Customer or <strong>admin123</strong> for Admin.
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-gold w-100 py-2">Login</button>
                <div class="text-center mt-3">
                    <a href="../../index.html" class="text-muted text-decoration-none small">Back to Shop</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/core-data.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // First, attempt to log in using the existing users in BrewscapeData
            let user = BrewscapeData.login(email, password);

            // If no user is found, check for the demo passwords and auto-register them
            if (!user) {
                const role = (password === 'admin123') ? 'admin' : (password === 'user123' ? 'user' : '');

                if (role) {
                    // Check if user already exists in the system
                    const usersList = BrewscapeData.getData('users');
                    const existingUser = usersList.find(u => u.email === email);

                    if (existingUser) {
                        // Email exists, but password didn't match. 
                        // Since they used a magic password, allow them in for demo purposes.
                        user = existingUser;
                        // Update role to match the used magic password if necessary
                        if (user.role !== role) {
                            user.role = role;
                            const uIndex = usersList.findIndex(u => u.email === email);
                            usersList[uIndex].role = role;
                            BrewscapeData.saveData('users', usersList);
                        }
                        BrewscapeData.setCurrentUser(user);
                    } else {
                        // Auto-register the demo user so they appear in the admin user table
                        user = BrewscapeData.register({
                            name: role === 'admin' ? 'System Admin' : 'Valued Customer',
                            email: email,
                            password: password,
                            role: role,
                            phone: '+855 (000) 000-0000'
                        });
                        
                        if (user) BrewscapeData.setCurrentUser(user);
                    }
                }
            }

            if (user) {
                window.location.href = user.role === 'admin' ? '../../admin/index.html' : '../../index.html';
            } else {
                alert('Invalid email or password! Please use the demo credentials (user123 or admin123).');
            }
        });
    </script>
</body>
</html>
